version: "3.9"

services:
  app:
    build: .
    container_name: reclio
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/db:/app/data/db
      - ./data/chroma:/app/data/chroma
    ports:
      - "8000:8000"
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: reclio-ollama
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"

  caddy:
    image: caddy:2-alpine
    container_name: reclio-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
    depends_on:
      - app
