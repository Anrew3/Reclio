name: Release

# Builds and publishes a multi-arch Docker image to GHCR whenever a
# SemVer tag is pushed (v1.2.3) or a GitHub Release is published.
#
# v1.6.0: switched from single-job multi-arch + QEMU emulation to
# parallel native amd64 + arm64 jobs + a manifest-merge step.
# Public-repo arm64 runners (`ubuntu-24.04-arm`) are free; running
# arm64 natively instead of under QEMU drops release wall time from
# ~30 min to ~5-8 min for our Python-heavy image (torch, chromadb).

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/reclio

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm   # native arm64 silicon, no QEMU
            arch: arm64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }} only, with arch-suffixed tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.arch }}
          # Per-arch GHA cache scopes so amd64 and arm64 don't trample
          # each other's cached layers.
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: false  # multi-arch manifests handled by the merge job below

  manifest:
    name: combine into multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Create + push multi-arch manifest
        # `imagetools create` stitches the two arch-suffixed tags into a
        # single multi-arch index pointed to by every output of meta.
        run: |
          set -euo pipefail
          AMD64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          ARM64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "::group::publish $TAG"
            docker buildx imagetools create -t "$TAG" "$AMD64" "$ARM64"
            echo "::endgroup::"
          done <<< "${{ steps.meta.outputs.tags }}"
