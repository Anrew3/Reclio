name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-compile:
    name: Lint + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff + project deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9
          pip install -r requirements.txt

      - name: Ruff (syntax-only)
        run: ruff check app --select E9,F63,F7,F82 --no-cache

      - name: Ruff (full, warning-only)
        run: ruff check app --no-cache || true

      - name: Compile every module
        run: python -m compileall -q app

      - name: Import app (catches cyclic imports + bad env defaults)
        env:
          FERNET_KEY: "w4W7ZKZvMgZkXsWm9ylNXrTLd-VUbQjzGqg8YbdcE8Y="
          SECRET_KEY: "ci-only-not-a-real-secret"
        run: python -c "import app.main; print('OK')"

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: lint-and-compile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: reclio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
