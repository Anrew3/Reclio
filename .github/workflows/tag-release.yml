name: Tag Release

# Creates a SemVer tag + GitHub Release from the Actions runner, then
# dispatches the Release image build for that tag.
#
# Why this exists: remote tooling (Claude Code sessions, some CI bots)
# can merge PRs but can't push tag refs. Running `gh release create`
# inside Actions sidesteps that — the workflow token is allowed to
# create tags/releases. Because events made with the default token
# don't trigger other workflows, this job explicitly dispatches
# release.yml on the new tag so the versioned image tags
# (X.Y.Z / X.Y / X / latest) still get published to GHCR.
#
# Usage: Actions → "Tag Release" → Run workflow → version: 1.8.1

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer to release, e.g. 1.8.1 (tag becomes v1.8.1)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION#v}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::'$VERSION' is not SemVer (expected e.g. 1.8.1)"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::release $TAG already exists — skipping create"
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Dispatch image build for the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION#v}"
          gh workflow run release.yml --ref "$TAG"
          echo "::notice::release.yml dispatched on $TAG — SemVer image tags incoming"
