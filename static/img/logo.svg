<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="reclio-eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Antenna -->
  <line x1="64" y1="18" x2="64" y2="32" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="64" cy="14" r="4.5" fill="#ffffff"/>

  <!-- Genie-bot body: domed top, wavy bottom -->
  <path d="
    M 26 60
    Q 26 30 64 30
    Q 102 30 102 60
    L 102 102
    Q 90 114 78 102
    Q 64 114 50 102
    Q 38 114 26 102
    Z" fill="#ffffff"/>

  <!-- Visor -->
  <rect x="38" y="52" width="52" height="26" rx="13" fill="#1c1c1e"/>

  <!-- Glowing eyes -->
  <circle cx="52" cy="65" r="5" fill="url(#reclio-eye)"/>
  <circle cx="76" cy="65" r="5" fill="url(#reclio-eye)"/>
</svg>
